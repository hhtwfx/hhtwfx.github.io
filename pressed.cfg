#### 1. 系统基础设置
# 语言、国家和键盘布局
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i netcfg/get_hostname string hp2540p
d-i netcfg/get_domain string local

#### 2. 硬件适配 (关键：针对 i7-640LM 优化)
# 强制使用传统 BIOS 引导，禁用 UEFI
d-i debian-installer/exit/poweroff boolean true
d-i grub-installer/force-efi-extra-removable boolean false
d-i grub-installer/only-debian boolean true

#### 3. 磁盘分区 (全盘自动格式化)
# 警告：这将完全擦除 /dev/sda 数据
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

#### 4. 用户与密码
# 禁用 root 登录，创建普通用户
d-i passwd/root-login boolean false
d-i passwd/user-fullname string hpuser
d-i passwd/username string hpuser
# 密码: debian123 (请务必使用 mkpasswd -m sha-512 生成你自己的)
d-i passwd/user-password-crypted password $6$randomsalt$N9Y7XqZqLk5mE8gJ9kLmN3pQrT7yUioP9lKjMnhBvCxZaLkjHgfDsaQwErtYui

#### 5. 软件包选择 (包含必要的驱动)
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server firmware-linux-nonfree vim htop
d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/update-policy select unattended-upgrades

#### 6. 镜像源 (使用国内源加速)
d-i mirror/country string manual
d-i mirror/http/hostname string mirrors.ustc.edu.cn
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string